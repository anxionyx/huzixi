<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify with reCAPTCHA</title>

    <!--
    ============================================================
    IMPORTANT – reCAPTCHA Site Key
    ============================================================
    Replace "YOUR_SITE_KEY" below with your own reCAPTCHA v2
    site key from the Google Admin Console.

    For local testing, you may use Google's public test key:
      Site key:   6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI
      Secret key: 6LeIxAcTAAAAAGG-vFI1TnRWxMZNFuojJ4WifJWe

    The test key always works for demo purposes.
    ============================================================
    -->

    <style>
        /* ---------- Reset & Base ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #f5f7fa 0%, #e9edf5 100%);
            padding: 1.5rem;
        }

        /* ---------- Card ---------- */
        .captcha-card {
            background: #ffffff;
            max-width: 480px;
            width: 100%;
            padding: 2.8rem 2.2rem 3rem;
            border-radius: 32px;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.10),
                0 8px 24px rgba(0, 0, 0, 0.06);
            text-align: center;
            transition: transform 0.2s ease;
        }

        .captcha-card:hover {
            transform: translateY(-2px);
        }

        /* ---------- Icon & Title ---------- */
        .icon-shield {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 72px;
            height: 72px;
            background: #eef3fe;
            border-radius: 50%;
            margin-bottom: 1.2rem;
            font-size: 2.4rem;
        }

        h1 {
            font-size: 1.7rem;
            font-weight: 600;
            color: #1a2639;
            letter-spacing: -0.3px;
            margin-bottom: 0.35rem;
        }

        .subtitle {
            font-size: 0.95rem;
            color: #5e6f8d;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        /* ---------- reCAPTCHA Container ---------- */
        .recaptcha-wrapper {
            display: flex;
            justify-content: center;
            margin: 1.2rem 0 1.8rem;
            min-height: 78px;
            /* reserve space for the widget */;
        }

        /* ---------- Status Messages ---------- */
        .status {
            font-size: 0.92rem;
            min-height: 1.8rem;
            margin-top: 0.5rem;
            transition: opacity 0.25s ease;
        }

        .status.pending {
            color: #7a8aa3;
        }

        .status.success {
            color: #0f7b3e;
            font-weight: 500;
        }

        .status.error {
            color: #b3363a;
            font-weight: 500;
        }

        /* ---------- Footer ---------- */
        .footer-note {
            margin-top: 2rem;
            font-size: 0.78rem;
            color: #9aabbf;
            border-top: 1px solid #eef2f7;
            padding-top: 1.4rem;
            letter-spacing: 0.2px;
        }

        .footer-note code {
            background: #f0f4fc;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            color: #2c3e66;
        }

        /* ---------- Responsive ---------- */
        @media (max-width: 480px) {
            .captcha-card {
                padding: 2rem 1.2rem 2.2rem;
            }
            h1 {
                font-size: 1.4rem;
            }
            .icon-shield {
                width: 60px;
                height: 60px;
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

    <div class="captcha-card" role="main" aria-labelledby="captcha-title">

        <!-- Icon -->
        <div class="icon-shield" aria-hidden="true">🛡️</div>

        <!-- Title -->
        <h1 id="captcha-title">Verify you're human</h1>
        <p class="subtitle">
            Please complete the reCAPTCHA challenge below to continue.
        </p>

        <!-- reCAPTCHA Widget -->
        <div class="recaptcha-wrapper">
            <div
            class="g-recaptcha"
            data-sitekey="6Lc5eD0tAAAAAPqUhsX1wIvPKvUx4dUzGd8f3-0Q"
            data-callback="onCaptchaSuccess"
            data-expired-callback="onCaptchaExpired"
            data-error-callback="onCaptchaError"
            data-theme="light"
            data-size="normal"
            ></div>
        </div>

        <!-- Status Message -->
        <div id="statusMessage" class="status pending">
            ⏳ Awaiting verification…
        </div>

        <!-- Footer -->
        <div class="footer-note">
            <span>🔐 Protected by reCAPTCHA &bull; </span>
            <span>Redirects to <code>/rindex.html</code></span>
        </div>
    </div>

    <!-- ============================================================
    Google reCAPTCHA API – loaded asynchronously
    ============================================================ -->
    <script src="https://www.google.com/recaptcha/api.js" async defer>
    </script>

    <!-- ============================================================
    Application Logic
    ============================================================ -->
    <script>
        /**
         * Get a reference to the status message element.
         */
        const statusEl = document.getElementById('statusMessage');

        /**
         * Update the status message with a given text and CSS class.
         * @param {string} text  - The message to display.
         * @param {string} type  - 'pending' | 'success' | 'error'
         */
        function setStatus(text, type) {
            statusEl.textContent = text;
            statusEl.className = 'status ' + type;
        }

        /**
         * Called when the user successfully completes the reCAPTCHA.
         * Redirects to /rindex.html after a short delay (so the user
         * can see the success feedback).
         */
        function onCaptchaSuccess(token) {
            // token is the reCAPTCHA response token (not needed for redirect)
            console.log('✅ reCAPTCHA succeeded, token:', token);

            // Show success message
            setStatus('✅ Verification successful! Redirecting…', 'success');

            // Redirect to /rindex.html after a brief pause (300ms)
            // so the user sees the success state before the page changes.
            setTimeout(function() {
                window.location.href = '/rindex.html';
            }, 300);
        }

        /**
         * Called when the reCAPTCHA response expires (user must re-verify).
         */
        function onCaptchaExpired() {
            console.warn('⏳ reCAPTCHA expired — user must verify again.');
            setStatus('⏳ Verification expired — please try again.', 'pending');
        }

        /**
         * Called when an error occurs in the reCAPTCHA widget.
         */
        function onCaptchaError() {
            console.error('❌ reCAPTCHA error occurred.');
            setStatus('❌ An error occurred. Please refresh and try again.', 'error');
        }

        // -----------------------------------------------------------------
        // (Optional) If you want to reset the reCAPTCHA programmatically,
        // you can use: grecaptcha.reset()
        // Expose it globally for debugging if needed.
        // -----------------------------------------------------------------
        window.resetCaptcha = function() {
            if (typeof grecaptcha !== 'undefined' && grecaptcha.reset) {
                grecaptcha.reset();
                setStatus('⏳ Reset — please verify again.', 'pending');
                console.log('🔄 reCAPTCHA reset.');
            } else {
                console.warn('⚠️ grecaptcha not yet loaded.');
            }
        };

        // Log that the page is ready
        console.log('🚀 reCAPTCHA page loaded. Site key: 6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI (test key)');
        console.log('ℹ️  Replace with your own site key for production.');
    </script>

</body>
</html>
