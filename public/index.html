<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify with Turnstile + reCAPTCHA</title>

    <style>
        /* ---------- Reset & Base ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #f5f7fa 0%, #e9edf5 100%);
            padding: 1.5rem;
        }

        /* ---------- Card ---------- */
        .captcha-card {
            background: #ffffff;
            max-width: 520px;
            width: 100%;
            padding: 2.8rem 2.2rem 3rem;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.10), 0 8px 24px rgba(0, 0, 0, 0.06);
            text-align: center;
            transition: transform 0.2s ease;
        }

        .captcha-card:hover {
            transform: translateY(-2px);
        }

        /* ---------- Icon & Title ---------- */
        .icon-shield {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 72px;
            height: 72px;
            background: #eef3fe;
            border-radius: 50%;
            margin-bottom: 1.2rem;
            font-size: 2.4rem;
        }

        h1 {
            font-size: 1.7rem;
            font-weight: 600;
            color: #1a2639;
            letter-spacing: -0.3px;
            margin-bottom: 0.35rem;
        }

        .subtitle {
            font-size: 0.95rem;
            color: #5e6f8d;
            margin-bottom: 1.8rem;
            line-height: 1.5;
        }

        /* ---------- Wrappers ---------- */
        .turnstile-wrapper {
            display: flex;
            justify-content: center;
            margin: 0.8rem 0 0.5rem;
            min-height: 65px;
        }

        .recaptcha-wrapper {
            display: flex;
            justify-content: center;
            margin: 1.2rem 0 0.5rem;
            min-height: 78px;
        }

        /* ---------- Status Messages ---------- */
        .status {
            font-size: 0.92rem;
            min-height: 1.8rem;
            margin-top: 0.4rem;
            transition: opacity 0.25s ease;
        }

        .status.pending {
            color: #7a8aa3;
        }

        .status.success {
            color: #0f7b3e;
            font-weight: 500;
        }

        .status.error {
            color: #b3363a;
            font-weight: 500;
        }

        .status.turnstile-ok {
            color: #0f7b3e;
            font-size: 0.85rem;
        }

        /* ---------- Footer ---------- */
        .footer-note {
            margin-top: 2rem;
            font-size: 0.78rem;
            color: #9aabbf;
            border-top: 1px solid #eef2f7;
            padding-top: 1.4rem;
            letter-spacing: 0.2px;
        }

        .footer-note code {
            background: #f0f4fc;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            color: #2c3e66;
        }

        /* ---------- Responsive ---------- */
        @media (max-width: 480px) {
            .captcha-card {
                padding: 2rem 1.2rem 2.2rem;
            }
            h1 {
                font-size: 1.4rem;
            }
            .icon-shield {
                width: 60px;
                height: 60px;
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

    <div class="captcha-card" role="main" aria-labelledby="captcha-title">

        <!-- Icon -->
        <div class="icon-shield" aria-hidden="true">🛡️</div>

        <!-- Title -->
        <h1 id="captcha-title">Verify you're human</h1>
        <p class="subtitle">
            Non‑interactive Cloudflare check first, then complete the Google reCAPTCHA.
        </p>

        <!-- ==========================================================
        CLOUDFLARE TURNSTILE (non‑interactive, placed first)
        ========================================================== -->
        <div class="turnstile-wrapper">
            <div
            class="cf-turnstile"
            data-sitekey="0x4AAAAAADtRzrfB5Uzz_YDX"
            data-mode="non-interactive"
            data-callback="onTurnstileSuccess"
            data-theme="light"
            ></div>
        </div>

        <!-- Turnstile status (updates silently) -->
        <div id="turnstileStatus" class="status pending">
            ⏳ Running Cloudflare challenge…
        </div>

        <!-- ==========================================================
        GOOGLE reCAPTCHA v2 (checkbox)
        ========================================================== -->
        <div class="recaptcha-wrapper">
            <div
            class="g-recaptcha"
            data-sitekey="6Lc5eD0tAAAAAPqUhsX1wIvPKvUx4dUzGd8f3-0Q"
            data-callback="onCaptchaSuccess"
            data-expired-callback="onCaptchaExpired"
            data-error-callback="onCaptchaError"
            data-theme="light"
            data-size="normal"
            ></div>
        </div>

        <!-- Overall status message -->
        <div id="statusMessage" class="status pending">
            ⏳ Waiting for Google reCAPTCHA…
        </div>

        <!-- Footer -->
        <div class="footer-note">
            <span>🔐 Turnstile + reCAPTCHA &bull; </span>
            <span>Redirects to <code>/rindex.html</code></span>
        </div>
    </div>

    <!-- ============================================================
    SCRIPTS
    ============================================================ -->

    <!-- Cloudflare Turnstile API -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer>
    </script>

    <!-- Google reCAPTCHA API -->
    <script src="https://www.google.com/recaptcha/api.js" async defer>
    </script>

    <!-- ============================================================
    APPLICATION LOGIC
    ============================================================ -->
    <script>
        (function() {
            "use strict";

            // ----- DOM refs -----
            const statusEl = document.getElementById('statusMessage');
            const turnstileStatusEl = document.getElementById('turnstileStatus');

            // ----- State -----
            let turnstileVerified = false;
            let recaptchaVerified = false;

            // ----- Helpers -----
            function setStatus(text, type) {
                statusEl.textContent = text;
                statusEl.className = 'status ' + type;
            }

            function setTurnstileStatus(text, type) {
                turnstileStatusEl.textContent = text;
                turnstileStatusEl.className = 'status ' + type;
            }

            function redirectUser() {
                setStatus('✅ All verifications passed! Redirecting…', 'success');
                setTimeout(function() {
                    window.location.href = '/rindex.html';
                }, 300);
            }

            // ----- Cloudflare Turnstile callback -----
            window.onTurnstileSuccess = function(token) {
                turnstileVerified = true;
                setTurnstileStatus('✅ Cloudflare challenge passed (silent).', 'success');
                console.log('🌤️ Turnstile token:', token);

                // If Google reCAPTCHA already succeeded, redirect now.
                if (recaptchaVerified) {
                    redirectUser();
                } else {
                    setStatus('⏳ Google reCAPTCHA still pending — tick the box.', 'pending');
                }
            };

            // ----- Google reCAPTCHA callbacks -----
            window.onCaptchaSuccess = function(token) {
                recaptchaVerified = true;
                console.log('✅ Google reCAPTCHA succeeded, token:', token);

                if (turnstileVerified) {
                    // Both passed → redirect
                    redirectUser();
                } else {
                    setStatus('⏳ Cloudflare still verifying… waiting (should be instant).', 'pending');
                    // Turnstile is non-interactive and usually finishes in < 1 second.
                    // We don't need a loop; when it finishes, it will check recaptchaVerified and redirect.
                }
            };

            window.onCaptchaExpired = function() {
                recaptchaVerified = false;
                console.warn('⏳ Google reCAPTCHA expired.');
                setStatus('⏳ Google verification expired — please tick the box again.', 'pending');
            };

            window.onCaptchaError = function() {
                console.error('❌ Google reCAPTCHA error.');
                setStatus('❌ Google reCAPTCHA error. Please refresh.', 'error');
            };

            // ----- (Optional) Reset both widgets -----
            window.resetAll = function() {
                if (typeof grecaptcha !== 'undefined' && grecaptcha.reset) {
                    grecaptcha.reset();
                }
                if (typeof turnstile !== 'undefined' && turnstile.reset) {
                    turnstile.reset();
                }
                turnstileVerified = false;
                recaptchaVerified = false;
                setTurnstileStatus('⏳ Cloudflare challenge reset.', 'pending');
                setStatus('⏳ Reset — verify again.', 'pending');
                console.log('🔄 All widgets reset.');
            };

            console.log('🚀 Page loaded – Cloudflare Turnstile (non‑interactive) + Google reCAPTCHA v2.');
            console.log('✅ Using your custom keys.');
        })();
    </script>

</body>
</html>
